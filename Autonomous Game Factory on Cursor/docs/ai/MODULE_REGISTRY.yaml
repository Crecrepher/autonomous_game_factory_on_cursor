# EXAMPLE FILE — 이 파일은 AI Game Dev Framework의 예시 문서입니다.
# 실제 프로젝트에 적용할 때 이 내용을 프로젝트에 맞게 수정하여 Docs/ai/MODULE_REGISTRY.yaml로 사용하세요.

# 모듈 레지스트리 — 아이소메트릭 3D 아케이드 Idle 게임 (예시)
# editable: false → AI가 해당 모듈 코드 수정 금지 (문서만 참조)
# risk: high/medium/low → 잘못 수정 시 영향도

modules:
  - name: Core
    path: Assets/Game/Core
    editable: false
    risk: high
    description: 부트스트랩, 입력(조이스틱 포함), 카메라(아이소메트릭), 세이브. 전역 필수 시스템.
    dependencies: []

  - name: Shared
    path: Assets/Game/Shared
    editable: true
    risk: low
    description: 공용 인터페이스(IHealth, ICurrencyHolder 등), enum, 상수, 공용 데이터. 모듈 간 계약.
    dependencies: []

  - name: GameManager
    path: Assets/Game/Modules/GameManager
    editable: true
    risk: high
    description: 게임 매니저, 게임 플로우, 씬/라운드 진입·종료, 실패/성공 분기.
    dependencies: [Core, Shared]

  - name: Mediators
    path: Assets/Game/Modules/Mediators
    editable: true
    risk: medium
    description: 게임 기능별 중재자(전투·경제·손님·기계 등). 기능 간 조율만 담당.
    dependencies: [Core, Shared, GameManager]

  - name: Economy
    path: Assets/Game/Modules/Economy
    editable: true
    risk: medium
    description: 재화(종류, 금액), 추가/소비/획득/셋팅, 돈을 소비·버는·셋팅하는 객체.
    dependencies: [Core, Shared]
    config_hint: currency types, add/spend/earn/set APIs, spendable/earnable/setter interfaces

  - name: ItemStack
    path: Assets/Game/Modules/ItemStack
    editable: true
    risk: medium
    description: 아이템 스택/언스택, 스택 슬롯 보유 객체(최대치 등), 스택 모션, 아이템 타입·종류·스택 두께 속성.
    dependencies: [Core, Shared]
    config_hint: stack max, stack thickness, item type/kind SO, stack motion curves

  - name: Player
    path: Assets/Game/Modules/Player
    editable: true
    risk: medium
    description: 조이스틱으로 움직이는 플레이어 캐릭터, 이동·상태. (입력은 Core)
    dependencies: [Core, Shared]

  - name: Machines
    path: Assets/Game/Modules/Machines
    editable: true
    risk: medium
    description: 기계, 아이템 생산, 생산 규칙·조건·주기 등 설정값.
    dependencies: [Core, Shared, ItemStack]
    config_hint: production rules, conditions, cycle/interval, output item type

  - name: Customers
    path: Assets/Game/Modules/Customers
    editable: true
    risk: medium
    description: 손님, 줄 서기, 요구 아이템 종류·갯수, 행동 플로우.
    dependencies: [Core, Shared, ItemStack, Economy]
    config_hint: queue logic, demand item type/count, behavior flow SO

  - name: Combat
    path: Assets/Game/Modules/Combat
    editable: true
    risk: medium
    description: 체력 객체·죽음, 조건별 데미지 상호작용, 회복 영역, 근접/광역/원거리 공격, 투사체, 포탑, 적 풀링·AI·행동패턴, 체력 방어벽, 적 사망 아이템 드롭, 다중 무기 슬롯·전투 레벨, 보스·공격패턴, 플레이어/목표 추적.
    dependencies: [Core, Shared, ItemStack]
    config_hint: damage conditions, recovery zone, projectile/turret SO, enemy pool, boss patterns, tracking

  - name: Pickups
    path: Assets/Game/Modules/Pickups
    editable: true
    risk: low
    description: 줍기 가능한 아이템 또는 재화. 수집 반경·연출.
    dependencies: [Core, Shared, ItemStack, Economy]

  - name: Automation
    path: Assets/Game/Modules/Automation
    editable: true
    risk: medium
    description: 자동화 로직, 아이템 레일(이동 경로·전달).
    dependencies: [Core, Shared, ItemStack, Machines]
    config_hint: rail paths, conveyor logic, automation triggers

  - name: Progression
    path: Assets/Game/Modules/Progression
    editable: true
    risk: medium
    description: 해금 노드, 업그레이드 정보(ScriptableObject). 전투 레벨·무기 해금 연동.
    dependencies: [Core, Shared]
    config_hint: unlock node graph, upgrade definitions, level gates

  - name: Guide
    path: Assets/Game/Modules/Guide
    editable: true
    risk: low
    description: 가이드, 튜토리얼 플로우·하이라이트.
    dependencies: [Core, Shared, UI]

  - name: Sound
    path: Assets/Game/Modules/Sound
    editable: true
    risk: low
    description: 사운드 클립·이벤트·설정. 재생 진입점은 Core 또는 Sound 모듈 내 정적/서비스.
    dependencies: [Core, Shared]

  - name: EndCard
    path: Assets/Game/Modules/EndCard
    editable: true
    risk: low
    description: 엔드카드(결과 화면), 성공/실패 연출·재시작/다음.
    dependencies: [Core, Shared, GameManager, UI]

  - name: Options
    path: Assets/Game/Modules/Options
    editable: true
    risk: low
    description: 다이나믹 옵션(볼륨·진동·화질 등). 런타임 반영.
    dependencies: [Core, Shared]

  - name: UI
    path: Assets/Game/Modules/UI
    editable: true
    risk: medium
    description: UI 관리, 조이스틱 UI, 재화 금액 표시, 성공/실패 분기 UI, CTA 버튼.
    dependencies: [Core, Shared, Economy]

  - name: Template
    path: Assets/Game/Modules/Template
    editable: true
    risk: low
    description: AI 생성용 표준 모듈 템플릿. 복사 후 모듈명·도메인에 맞게 수정.
    dependencies: [Core, Shared]

  - name: StatusEffect
    path: Assets/Game/Modules/StatusEffect
    editable: true
    risk: low
    description: 상태이상 시스템(v1). 효과 정의·적용·틱·만료 관리. 외부 모듈 수정 없음.
    dependencies: [Core, Shared]
    config_hint: effect type, duration, tick interval, value per tick

# 의존성 규칙
# - 모듈은 dependencies에 나열된 모듈만 참조한다.
# - Core는 다른 모듈에 의존하지 않는다.
# - 순환 의존 금지. Guide는 UI에 의존 가능(표시용).
# - 새 모듈 추가 시 name, path, editable, risk, description, dependencies(, config_hint)를 추가한다.
