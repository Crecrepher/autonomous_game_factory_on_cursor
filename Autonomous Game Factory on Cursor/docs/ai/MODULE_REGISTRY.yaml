# 모듈 레지스트리 — Autonomous Game Factory (범용 Playable Ad)
# editable: false → AI가 해당 모듈 코드 수정 금지 (문서만 참조)
# risk: high/medium/low → 잘못 수정 시 영향도

# ── 의존성 규칙 ──
# - 모듈은 dependencies에 나열된 대상만 참조할 수 있다.
# - dependencies에 사용 가능한 값:
#     모듈 이름(name)  — 다른 모듈을 참조 (빌드 순서 + 참조 허용)
#     "UnityEngine"    — UnityEngine.* 네임스페이스
#     "System"         — System.* 네임스페이스
# - 순환 의존 금지. (CircularDependencyValidator가 DFS로 감지)
# - 코드의 using Game.<ModuleName> 문은 반드시 dependencies에 해당 모듈이 선언되어야 한다.
#   (DependencyValidator가 자동 검증)
# - TASK_QUEUE.yaml의 depends_on은 이 파일의 dependencies와 일치해야 한다.
# - 새 모듈 추가 시 아래 필드를 반드시 작성한다:
#     name, path, editable, risk, description, dependencies, dimension, genre_tags (, config_hint)
# - 의존성 그래프는 DependencyGraphBuilder.cs가 빌드하며 토폴로지 정렬로 실행 순서를 결정한다.

# ── 카탈로그 메타데이터 ──
# dimension: 2d | 3d | both → 모듈이 지원하는 차원
# genre_tags: [] → 모듈이 활용될 수 있는 장르 태그 (복수 가능)
#   범용(universal), 아케이드(arcade), 아이들(idle), 타워디펜스(tower-defense),
#   액션(action), 퍼즐(puzzle), 러너(runner), 시뮬레이션(simulation),
#   슈팅(shooting), RPG(rpg), 머지(merge), 스태킹(stacking) 등
# reuse_hint: 다른 게임에서 이 모듈을 재사용할 때 참고할 설명

# ── 모듈 카테고리 ──
# [Core Infrastructure] — 거의 모든 게임에서 재사용되는 핵심 시스템
# [Combat & Unit]       — 전투/유닛 관련 (타워디펜스, 액션, RPG 등)
# [Economy & Resource]  — 재화/자원 관련 (대부분의 게임)
# [Building & Placement] — 건설/배치 관련 (타워디펜스, 시뮬레이션, 아이들 등)
# [Item & Inventory]    — 아이템/인벤토리 (RPG, 아이들, 머지 등)
# [UI & UX]             — UI/연출/가이드 (범용)
# [Game Flow]           — 게임 흐름 제어 (범용)

modules:

  # ══════════════════════════════════════════════════════════════
  # [Template] — 참조용 템플릿
  # ══════════════════════════════════════════════════════════════

  - name: Template
    path: Assets/Game/Modules/Template
    editable: true
    risk: low
    dimension: both
    genre_tags: [universal]
    description: AI 생성용 표준 모듈 템플릿. 복사 후 모듈명·도메인에 맞게 수정.
    reuse_hint: 모든 새 모듈의 출발점. 6파일 구조(I<Module>, Config, Runtime, Factory, Bootstrap, Tests) 제공.
    dependencies: [UnityEngine]

  # ══════════════════════════════════════════════════════════════
  # [Core Infrastructure] — 거의 모든 게임에서 재사용
  # ══════════════════════════════════════════════════════════════

  - name: DynamicConfig
    path: Assets/Game/Modules/DynamicConfig
    editable: true
    risk: low
    dimension: both
    genre_tags: [universal]
    description: >
      런타임 밸런스 조절 시스템. 키-값 기반으로 각 모듈의 속도/비용/HP 등을 동적으로 변경.
    reuse_hint: 모든 장르에서 런타임 밸런싱에 활용. 키-값 구조라 장르 무관.
    dependencies: [UnityEngine, System]
    config_hint: max entries

  - name: StatusEffect
    path: Assets/Game/Modules/StatusEffect
    editable: true
    risk: low
    dimension: both
    genre_tags: [universal, action, rpg, tower-defense, arcade]
    description: >
      상태이상 시스템. 효과 정의·적용·틱·만료 관리. 버프/디버프 범용 처리.
      IStatusEffect 인터페이스, StatusEffectConfig(ScriptableObject), StatusEffectRuntime(순수 C#).
    reuse_hint: >
      속도 증가, 공격력 버프, 슬로우, 독, 화상 등 시간 기반 효과가 필요한 모든 게임에서 재사용.
      효과 종류는 Config SO로 확장.
    dependencies: [UnityEngine, System]
    config_hint: effect type, duration, tick interval, value per tick

  # ══════════════════════════════════════════════════════════════
  # [Economy & Resource] — 재화/자원 시스템
  # ══════════════════════════════════════════════════════════════

  - name: Economy
    path: Assets/Game/Modules/Economy
    editable: true
    risk: medium
    dimension: both
    genre_tags: [universal, idle, arcade, rpg, tower-defense, simulation]
    description: >
      재화 경제 시스템. 재화 정의, 잔고 관리, 획득/소비 이벤트.
      IEconomy 인터페이스, EconomyConfig(ScriptableObject), EconomyRuntime(순수 C#).
    reuse_hint: >
      코인, 젬, 골드 등 재화가 있는 모든 게임. 재화 종류는 Config에서 확장.
      TrySpend/Add/OnBalanceChanged 패턴은 거의 모든 경제 시스템의 기반.
    dependencies: [UnityEngine, System]
    config_hint: starting balance, max balance

  - name: Pickups
    path: Assets/Game/Modules/Pickups
    editable: true
    risk: low
    dimension: both
    genre_tags: [universal, arcade, action, idle, runner]
    description: >
      필드 드롭 아이템 수집 시스템. 자동/수동 수집, Economy 연동.
      IPickups 인터페이스, PickupsConfig(ScriptableObject), PickupsRuntime(순수 C#).
    reuse_hint: >
      코인 드롭, 아이템 드롭, 경험치 오브 등 필드에서 줍는 오브젝트가 있는 모든 게임.
      수집 방식(터치, 자동, 자석)은 Config에서 설정.
    dependencies: [UnityEngine, System, Economy]
    config_hint: max pending pickups, auto collect delay

  # ══════════════════════════════════════════════════════════════
  # [Combat & Unit] — 전투/유닛 시스템
  # ══════════════════════════════════════════════════════════════

  - name: Player
    path: Assets/Game/Modules/Player
    editable: true
    risk: medium
    dimension: both
    genre_tags: [universal, action, arcade, idle, runner, rpg]
    description: >
      플레이어 캐릭터 시스템. 이동, 공격, 입력 처리.
      IPlayer 인터페이스, PlayerConfig(ScriptableObject), PlayerRuntime(순수 C#).
    reuse_hint: >
      플레이어가 직접 조작하는 캐릭터가 있는 모든 게임.
      2D: 탑다운/사이드뷰 이동. 3D: 아이소메트릭/TPS 이동.
      이동 방식·공격 방식은 Config에서 확장.
    dependencies: [UnityEngine, System]
    config_hint: move speed, attack speed, attack damage, attack range

  - name: Enemies
    path: Assets/Game/Modules/Enemies
    editable: true
    risk: medium
    dimension: both
    genre_tags: [universal, action, arcade, tower-defense, rpg, shooting]
    description: >
      적 유닛 시스템. 스폰, 웨이브/패턴, AI, HP 관리.
      IEnemies 인터페이스, EnemiesConfig(ScriptableObject), EnemiesRuntime(순수 C#).
    reuse_hint: >
      적이 등장하는 모든 게임. 웨이브 기반(타워디펜스), 무한 스폰(러너), 보스 패턴(액션) 등.
      적 종류·스폰 규칙은 Config SO 배열로 확장.
    dependencies: [UnityEngine, System]
    config_hint: enemy type hp, coin drop, spawn interval, max alive

  - name: Warriors
    path: Assets/Game/Modules/Warriors
    editable: true
    risk: medium
    dimension: both
    genre_tags: [tower-defense, rpg, idle, simulation, action]
    description: >
      아군 유닛 고용/배치/자동 전투 시스템. 장비 착용 지원.
      IWarriors 인터페이스, WarriorsConfig(ScriptableObject), WarriorsRuntime(순수 C#).
    reuse_hint: >
      아군 유닛을 고용/배치하는 게임. 타워디펜스의 병사, 아이들 게임의 일꾼, RPG의 용병 등.
      유닛 타입·스탯은 Config SO 배열로 확장. 장비 시스템은 Blacksmith 모듈과 연동.
    dependencies: [UnityEngine, System, Economy]
    config_hint: max warriors, hire cost base/increment/max, attack/move speed

  # ══════════════════════════════════════════════════════════════
  # [Building & Placement] — 건설/배치/구조물 시스템
  # ══════════════════════════════════════════════════════════════

  - name: DefenseTowers
    path: Assets/Game/Modules/DefenseTowers
    editable: true
    risk: medium
    dimension: both
    genre_tags: [tower-defense, idle, simulation]
    description: >
      타워/구조물 건설·배치 시스템. 건설 비용, 유닛 배치, 업그레이드.
      IDefenseTowers 인터페이스, DefenseTowersConfig(ScriptableObject), DefenseTowersRuntime(순수 C#).
    reuse_hint: >
      타워/설치물을 건설하는 게임. 타워디펜스의 수비탑, 아이들 게임의 시설, 시뮬레이션의 건물 등.
      타워 종류·비용·효과는 Config SO 배열로 확장.
    dependencies: [UnityEngine, System, Economy]
    config_hint: max towers, early/late cost, warriors per tower

  - name: Fortress
    path: Assets/Game/Modules/Fortress
    editable: true
    risk: medium
    dimension: both
    genre_tags: [tower-defense, idle, simulation, rpg]
    description: >
      거점/기지 시스템. HP 관리, 다단계 업그레이드.
      IFortress 인터페이스, FortressConfig(ScriptableObject), FortressRuntime(순수 C#).
    reuse_hint: >
      방어해야 할 거점이 있는 게임. 타워디펜스의 본진, 아이들 게임의 메인 건물, RPG의 마을 등.
      업그레이드 단계·비용은 Config SO로 확장.
    dependencies: [UnityEngine, System, Economy]
    config_hint: max hp, upgrade level/cost

  - name: HireNodes
    path: Assets/Game/Modules/HireNodes
    editable: true
    risk: low
    dimension: both
    genre_tags: [tower-defense, idle, simulation]
    description: >
      고용/구매 노드 시스템. 필드 위 인터랙션 포인트, 비용 관리, 일괄 처리.
      IHireNodes 인터페이스, HireNodesConfig(ScriptableObject), HireNodesRuntime(순수 C#).
    reuse_hint: >
      필드에 인터랙션 포인트(고용, 구매, 건설 등)가 있는 게임.
      아이들 게임의 업그레이드 노드, 시뮬레이션의 배치 포인트 등으로 활용.
    dependencies: [UnityEngine, System, Economy, Warriors]
    config_hint: max nodes, default batch hire count

  - name: Blacksmith
    path: Assets/Game/Modules/Blacksmith
    editable: true
    risk: low
    dimension: both
    genre_tags: [rpg, idle, tower-defense, action]
    description: >
      제작/강화 시스템. 장비 생성, 유닛 장비 배분.
      IBlacksmith 인터페이스, BlacksmithConfig(ScriptableObject), BlacksmithRuntime(순수 C#).
    reuse_hint: >
      장비/아이템 제작·강화가 있는 게임. RPG의 대장간, 아이들의 제작소, 타워디펜스의 무기 강화 등.
      제작 레시피·비용은 Config SO 배열로 확장.
    dependencies: [UnityEngine, System, Economy, Warriors]
    config_hint: forge cost, max forge count, equipment per forge

  # ══════════════════════════════════════════════════════════════
  # [Item & Inventory] — 아이템/인벤토리 시스템
  # ══════════════════════════════════════════════════════════════

  - name: ItemStacking
    path: Assets/Game/Modules/ItemStacking
    editable: true
    risk: low
    dimension: both
    genre_tags: [universal, idle, stacking, arcade, simulation]
    description: >
      아이템 스태킹/언스태킹 시스템. 고정 크기 배열 기반 스택.
      IItemStacking 인터페이스, ItemStackingConfig(ScriptableObject), ItemStackingRuntime(순수 C#).
      Push/Pop/PopAll로 아이템 관리. 이벤트로 외부에 상태 통지.
    reuse_hint: >
      아이템을 쌓고 내려놓는 메카닉이 있는 모든 게임. 스태킹 러너, 아이들 팩토리 등.
      스택 크기·시각 오프셋은 Config로 확장.
    dependencies: [UnityEngine, System]
    config_hint: max stack size

  - name: InventorySystem
    path: Assets/Game/Modules/InventorySystem
    editable: true
    risk: low
    dimension: both
    genre_tags: [universal, rpg, idle, simulation, merge]
    description: >
      슬롯 기반 인벤토리 시스템. ItemStacking을 슬롯 단위 스택으로 재사용.
      IInventorySystem 인터페이스, InventorySystemConfig(ScriptableObject), InventorySystemRuntime(순수 C#).
      Add/Remove/Query/Has/GetCount API. 오버플로우 핸들링.
    reuse_hint: >
      아이템을 슬롯에 보관하는 게임. RPG 인벤토리, 아이들 게임 창고, 머지 게임 보드 등.
      슬롯 수·스택 크기는 Config로 확장.
    dependencies: [UnityEngine, System, ItemStacking]
    config_hint: max slots, max stack size per slot

  # ══════════════════════════════════════════════════════════════
  # [UI & UX] — UI/연출/가이드
  # ══════════════════════════════════════════════════════════════

  - name: Guide
    path: Assets/Game/Modules/Guide
    editable: true
    risk: low
    dimension: both
    genre_tags: [universal]
    description: >
      튜토리얼/가이드 시스템. 화살표 가이드, 조건부 노출, 유저 유도.
      IGuide 인터페이스, GuideConfig(ScriptableObject), GuideRuntime(순수 C#).
    reuse_hint: >
      Playable Ad에서 유저를 특정 행동으로 유도하는 모든 게임.
      가이드 조건·화살표 타입은 Config SO 배열로 확장.
    dependencies: [UnityEngine, System]
    config_hint: max active guides

  - name: BuffIconUI
    path: Assets/Game/Modules/BuffIconUI
    editable: true
    risk: low
    dimension: both
    genre_tags: [universal, action, rpg, tower-defense, arcade]
    description: >
      상태이상 아이콘 UI 표시. StatusEffect 모듈에 의존.
      IBuffIconUI 인터페이스, BuffIconUIConfig(ScriptableObject), BuffIconUIRuntime(순수 C#).
    reuse_hint: >
      버프/디버프 아이콘을 HUD에 표시하는 게임. StatusEffect와 함께 재사용.
    dependencies: [UnityEngine, System, StatusEffect]
    config_hint: max icons

  - name: UI
    path: Assets/Game/Modules/UI
    editable: true
    risk: low
    dimension: both
    genre_tags: [universal]
    description: >
      공통 UI 시스템. 재화 표시, CTA 버튼, HUD 관리.
      IUI 인터페이스, UIConfig(ScriptableObject), UIRuntime(순수 C#).
    reuse_hint: >
      Playable Ad 공통 UI(재화 표시, CTA, 진행률 바 등). 거의 모든 게임에서 재사용.
    dependencies: [UnityEngine, System, Economy]
    config_hint: show coin on start

  - name: EndCard
    path: Assets/Game/Modules/EndCard
    editable: true
    risk: low
    dimension: both
    genre_tags: [universal]
    description: >
      Playable Ad 엔드카드. 딤드 배경 + 로고 + CTA 버튼 + 스토어 링크.
      IEndCard 인터페이스, EndCardConfig(ScriptableObject), EndCardRuntime(순수 C#).
    reuse_hint: >
      모든 Playable Ad의 마지막 화면. 게임 종료 조건만 다르고 구조는 동일.
      EndCard 트리거 조건은 GameManager에서 제어.
    dependencies: [UnityEngine, System]
    config_hint: dim alpha, fade in duration

  # ══════════════════════════════════════════════════════════════
  # [Game Flow] — 게임 흐름 제어
  # ══════════════════════════════════════════════════════════════

  - name: GameManager
    path: Assets/Game/Modules/GameManager
    editable: true
    risk: high
    dimension: both
    genre_tags: [universal]
    description: >
      게임 전체 시퀀스/플로우 제어. 게임 시작 → 플레이 → 종료 → 엔드카드 흐름 관리.
      IGameManager 인터페이스, GameManagerConfig(ScriptableObject), GameManagerRuntime(순수 C#).
    reuse_hint: >
      모든 Playable Ad의 게임 흐름 관리자. 게임마다 dependencies가 달라짐.
      새 게임에서는 dependencies를 해당 게임의 모듈 조합으로 교체.
    dependencies: [UnityEngine, System, Player, Enemies, Economy]
    config_hint: total phases

  # ── Match Clash Modules (Puzzle RPG Playable Ad) ──

  - name: PuzzleBlock
    path: Assets/Game/Modules/PuzzleBlock
    editable: true
    risk: low
    dimension: 2d
    genre_tags: [match3, puzzle]
    description: >
      블록 타입 정의, SpriteRenderer 제어, Fallback 컬러 처리, 소멸/이동 애니메이션.
      IPuzzleBlock 인터페이스, PuzzleBlockConfig(ScriptableObject), PuzzleBlockRuntime(순수 C#).
    reuse_hint: >
      모든 매치-3 퍼즐 게임에서 블록 단위로 재사용 가능.
    dependencies: [UnityEngine, System]
    config_hint: block colors, sprites, destroy duration

  - name: PuzzleBoard
    path: Assets/Game/Modules/PuzzleBoard
    editable: true
    risk: medium
    dimension: 2d
    genre_tags: [match3, puzzle]
    description: >
      6x5 매치-3 퍼즐 보드 엔진. 스왑/매치 감지/소멸/낙하/리필/연쇄/셔플. 특수 블록(Bomb/SameColorClear) 지원.
      IPuzzleBoard 인터페이스, PuzzleBoardConfig, PuzzleBoardRuntime(순수 C#).
      PuzzleBoardInstance 오케스트레이터 포함.
    reuse_hint: >
      매치-3 계열 퍼즐 게임 핵심 엔진. 그리드 크기/색상 수 Config로 조절 가능.
    dependencies: [UnityEngine, System, PuzzleBlock]
    config_hint: grid size, color count, swap/fall/destroy durations

  - name: BattleCharacter
    path: Assets/Game/Modules/BattleCharacter
    editable: true
    risk: low
    dimension: both
