# ── AI 모듈 생성 태스크 큐 — v2 (Human-in-the-Loop) ──
# ── 범용 Playable Ad 프레임워크 (2D / 3D / 모든 장르) ──
#
# 이 파일은 병렬 AI 에이전트가 모듈을 생성할 때 작업 상태를 추적하는 단일 소스이다.
# 모듈은 여러 게임 프로젝트에서 재사용 가능한 범용 카탈로그로 관리된다.
#
# ── 스키마 버전 ──
# v2에서 4차원 상태 모델을 도입한다. 상세: STATE_MACHINE.md, TASK_SCHEMA.md
#
# ── 차원 1: status (빌드 진행) ──
#   pending     — 아직 아무도 건드리지 않음
#   planned     — Planner가 PLAN을 작성 완료
#   in_progress — Builder가 구현 중
#   review      — Reviewer 검증 중
#   done        — 전체 파이프라인 완료 (커밋 + 학습 포함)
#   blocked     — 의존 모듈 미완성 또는 검증 실패
#   escalated   — 3회 재시도 실패, 사람 직접 해결 필요
#
# ── 차원 2: human_state (사람 검증) ──
#   none        — 사람 검증 단계 아님
#   pending     — 사람 검증 대기
#   in_review   — 사람이 검증 중
#   fixing      — 사람이 코드 수정 중
#   validated   — 사람 검증 완료
#
# ── 차원 3: learning_state (학습 기록) ──
#   none        — 학습 기록 단계 아님
#   pending     — 학습 기록 대기
#   recorded    — 학습 기록 완료
#
# ── 차원 4: commit_state (커밋 상태) ──
#   none           — 커밋 단계 아님
#   ready          — 커밋 가능
#   committed      — 커밋 완료
#   recommit_ready — 재커밋 필요
#   recommitted    — 재커밋 완료
#
# ── 카탈로그 메타데이터 (MODULE_REGISTRY.yaml과 동기) ──
#   dimension: 2d | 3d | both
#   genre_tags: [universal, arcade, idle, tower-defense, action, rpg, ...]
#
# ── 핵심 규칙 ──
#   - human_state == validated 없이 status를 review로 전이 불가 (Human Validation Gate)
#   - commit_state ∈ {committed, recommitted} + learning_state == recorded 없이 done 불가
#   - retry_count >= 3이면 escalated 전이 필수
#   - owner != null인 태스크는 다른 에이전트가 가져갈 수 없다
#   - 신규 태스크는 feature_group 필수
#   - 기존 v1 엔트리는 새 필드 없이도 유효 (하위 호환)
#
# 상세 스키마: docs/ai/TASK_SCHEMA.md
# 상태 전이 규칙: docs/ai/STATE_MACHINE.md

